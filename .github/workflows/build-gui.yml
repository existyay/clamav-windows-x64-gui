name: Build ClamAV GUI

concurrency:
  group: build-gui-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          # Read current version from Cargo.toml
          $cargoToml = Get-Content "gui\Cargo.toml" -Raw
          if ($cargoToml -match 'version = "(\d+)\.(\d+)\.(\d+)"') {
            $major = [int]$matches[1]
            $minor = [int]$matches[2]
            $patch = [int]$matches[3]
          } else {
            $major = 1
            $minor = 0
            $patch = 0
          }

          # Fixed bump strategy: always patch
          $patch++

          $newVersion = "$major.$minor.$patch"
          $tagName = "v$newVersion"

          # Check if tag already exists
          git fetch --tags
          $tagExists = git tag -l $tagName
          if ($tagExists) {
            Write-Host "Tag $tagName already exists, adding build number"
            $buildNum = $env:GITHUB_RUN_NUMBER
            $newVersion = "$major.$minor.$patch-build$buildNum"
            $tagName = "v$newVersion"
          }

          # Output version info
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "tag=$tagName" >> $env:GITHUB_OUTPUT
          echo "major=$major" >> $env:GITHUB_OUTPUT
          echo "minor=$minor" >> $env:GITHUB_OUTPUT
          echo "patch=$patch" >> $env:GITHUB_OUTPUT

          Write-Host "New version: $newVersion"
          Write-Host "Tag: $tagName"
        shell: pwsh

      - name: Update version in files
        run: |
          $newVersion = "${{ steps.version.outputs.version }}"

          # Update Cargo.toml
          $cargoToml = Get-Content "gui\Cargo.toml" -Raw
          $cargoToml = $cargoToml -replace 'version = "\d+\.\d+\.\d+.*?"', "version = `"$newVersion`""
          Set-Content "gui\Cargo.toml" $cargoToml

          Write-Host "Updated Cargo.toml to version $newVersion"
        shell: pwsh

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg_installed
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-

      - name: Cache ClamAV install
        id: clamav_install_cache
        uses: actions/cache@v4
        with:
          path: build/install
          key: clamav-install-x64-${{ hashFiles('CMakeLists.txt', 'CMakeOptions.cmake', 'vcpkg.json', 'cmake/**', 'clamd/**', 'clamscan/**', 'freshclam/**', 'libclamav/**', 'libfreshclam/**') }}
          restore-keys: clamav-install-x64-

      - name: Install vcpkg dependencies (retry)
        run: |
          $ErrorActionPreference = "Stop"
          $vcpkgExe = "$env:VCPKG_ROOT\vcpkg.exe"
          $maxAttempts = 5

          # These settings are harmless for normal cases and can improve stability
          # on flaky CI networks/proxies.
          git config --global http.version HTTP/1.1
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "vcpkg install attempt $attempt/$maxAttempts"

            & $vcpkgExe install --triplet x64-windows
            if ($LASTEXITCODE -eq 0) {
              Write-Host "vcpkg install succeeded"
              break
            }

            if ($attempt -eq $maxAttempts) {
              throw "vcpkg install failed after $maxAttempts attempts"
            }

            Write-Host "::warning::vcpkg install failed. Cleaning registry cache and retrying..."
            $registryGitCache = Join-Path $env:LOCALAPPDATA "vcpkg\registries\git"
            if (Test-Path $registryGitCache) {
              Remove-Item $registryGitCache -Recurse -Force -ErrorAction SilentlyContinue
            }

            $sleepSeconds = [Math]::Min(60, [int]([Math]::Pow(2, $attempt) * 5))
            Write-Host "Sleeping $sleepSeconds seconds before retry"
            Start-Sleep -Seconds $sleepSeconds
          }
        shell: pwsh

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            gui -> target

      - name: Configure ClamAV (CMake)
        if: steps.clamav_install_cache.outputs.cache-hit != 'true'
        run: |
          mkdir build -ErrorAction SilentlyContinue
          cd build
          cmake .. -A x64 `
            -D CMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -D CMAKE_INSTALL_PREFIX="install" `
            -D ENABLE_TESTS=OFF `
            -D ENABLE_MILTER=OFF `
            -D ENABLE_EXAMPLES=OFF `
            -D ENABLE_MAN_PAGES=OFF `
            -D ENABLE_DOXYGEN=OFF

      - name: Build ClamAV
        if: steps.clamav_install_cache.outputs.cache-hit != 'true'
        run: |
          cd build
          cmake --build . --config Release --parallel
          cmake --build . --config Release --target install --parallel

      - name: Reuse cached ClamAV binaries
        if: steps.clamav_install_cache.outputs.cache-hit == 'true'
        run: |
          Write-Host "Using cached build/install (skipping CMake configure+build)."

      - name: Prepare Chinese font
        run: |
          New-Item -ItemType Directory -Path gui\fonts -Force | Out-Null
          # Try Microsoft YaHei first, fall back to SimSun
          $fontSrc = @("$env:SystemRoot\Fonts\msyh.ttc", "$env:SystemRoot\Fonts\simsun.ttc", "$env:SystemRoot\Fonts\malgun.ttf") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($fontSrc) {
            Copy-Item $fontSrc "gui\fonts\NotoSansSC-Regular.ttf" -Force
            Write-Host "Font copied from: $fontSrc"
          } else {
            Write-Host "::warning::No CJK font found, downloading Noto Sans SC"
            Invoke-WebRequest -Uri 'https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/SimplifiedChinese/NotoSansSC-Regular.otf' -OutFile 'gui\fonts\NotoSansSC-Regular.ttf' -UseBasicParsing
          }
        shell: pwsh

      - name: Build GUI
        run: |
          cd gui
          cargo build --release
        env:
          OPENSSL_DIR: ${{ github.workspace }}\vcpkg_installed\x64-windows
          OPENSSL_LIB_DIR: ${{ github.workspace }}\vcpkg_installed\x64-windows\lib
          OPENSSL_INCLUDE_DIR: ${{ github.workspace }}\vcpkg_installed\x64-windows\include

      - name: Generate build info
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $buildTime = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          $commitHash = git rev-parse --short HEAD

          New-Item -ItemType Directory -Path "dist" -Force | Out-Null

          @"
          Version: $version
          Build Time: $buildTime
          Commit: $commitHash
          "@ | Set-Content "dist\BUILD_INFO.txt"

          Write-Host "Build info created"
        shell: pwsh

      - name: Package portable distribution
        run: |
          $outputDir = "dist\ClamAV-GUI-Portable"
          $clamavInstall = "build\install"
          $guiExe = "gui\target\release\clamav-gui.exe"

          if (-not (Test-Path $guiExe)) {
            Write-Error "Missing GUI executable: $guiExe. Ensure 'Build GUI' step completed successfully."
            exit 1
          }

          # Create directories
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          New-Item -ItemType Directory -Path "$outputDir\clamav" -Force | Out-Null
          New-Item -ItemType Directory -Path "$outputDir\clamav\database" -Force | Out-Null
          New-Item -ItemType Directory -Path "$outputDir\clamav\certs" -Force | Out-Null
          New-Item -ItemType Directory -Path "$outputDir\quarantine" -Force | Out-Null
          New-Item -ItemType Directory -Path "$outputDir\logs" -Force | Out-Null

          # Copy GUI
          Copy-Item $guiExe "$outputDir\ClamAV-Scanner.exe"

          # Copy ClamAV executables
          $exes = @("clamscan.exe","freshclam.exe","clamd.exe","clamdscan.exe")
          foreach ($exe in $exes) {
            $src = "$clamavInstall\$exe"
            if (Test-Path $src) { Copy-Item $src "$outputDir\clamav\$exe" }
          }

          # Copy DLLs
          Get-ChildItem "$clamavInstall\*.dll" | ForEach-Object {
            Copy-Item $_.FullName "$outputDir\clamav\$($_.Name)"
          }

          # Copy certs
          Copy-Item "$clamavInstall\certs\*" "$outputDir\clamav\certs\" -Recurse -ErrorAction SilentlyContinue

          # Config files
          @"
          DatabaseMirror database.clamav.net
          Foreground yes
          MaxAttempts 3
          ConnectTimeout 30
          "@ | Set-Content "$outputDir\clamav\freshclam.conf"

          @"
          TCPSocket 3310
          TCPAddr 127.0.0.1
          Foreground yes
          MaxThreads 4
          "@ | Set-Content "$outputDir\clamav\clamd.conf"

          # License
          if (Test-Path "$clamavInstall\COPYING.txt") {
            Copy-Item "$clamavInstall\COPYING.txt" "$outputDir\LICENSE.txt"
          }
          if (Test-Path "$clamavInstall\COPYING") {
            Copy-Item "$clamavInstall\COPYING" "$outputDir\COPYING" -Recurse
          }

          # Create ZIP
          Compress-Archive -Path "$outputDir\*" -DestinationPath "dist\ClamAV-GUI-Portable-x64.zip" -CompressionLevel Optimal

          $size = [math]::Round((Get-Item "dist\ClamAV-GUI-Portable-x64.zip").Length / 1MB, 1)
          Write-Host "Package created: $size MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClamAV-GUI-Portable-x64-${{ steps.version.outputs.version }}
          path: dist/ClamAV-GUI-Portable-x64.zip

      - name: Commit version bump
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gui/Cargo.toml
          if (Test-Path "gui/Cargo.lock") {
            git add gui/Cargo.lock
          }
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
        shell: pwsh
        continue-on-error: true

      - name: Create and push tag
        if: github.event_name != 'pull_request'
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          git tag -a $tag -m "Release $tag"
          git push origin $tag
        shell: pwsh

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ClamAV GUI ${{ steps.version.outputs.version }}
          files: dist/ClamAV-GUI-Portable-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## ClamAV Windows x64 GUI - v${{ steps.version.outputs.version }}

            ### 📦 下载
            - **便携版**: ClamAV-GUI-Portable-x64.zip

            ### ✨ 功能特性
            - 🎨 现代化深色/浅色主题切换
            - ⚡ 快速扫描系统关键位置
            - 💿 全盘扫描功能
            - 🛡️ 实时保护（可选常驻）
            - 🔄 病毒库在线更新
            - 🔒 威胁隔离管理
            - 📊 美化的仪表盘和统计可视化
            - ⚙️ 灵活的扫描配置选项

            ### 🚀 性能优化
            - 多线程并行扫描（4线程）
            - 优化的扫描速度（2-4倍提升）
            - 实时显示扫描进度和当前文件

            ### 📝 使用说明
            1. 解压到任意目录
            2. 运行 `ClamAV-Scanner.exe`
            3. 首次使用建议先更新病毒库

            ### 🔧 系统要求
            - Windows 10/11 x64
            - .NET Framework 4.7.2+（系统自带）

            ---
            **构建时间**: ${{ github.event.repository.updated_at }}
            **提交**: ${{ github.sha }}
